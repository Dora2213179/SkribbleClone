services:
  # Backend Server
  - type: web
    name: skribbl-backend
    env: node
    rootDir: server
    buildCommand: npm install && npm run setup && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGINS
        value: "*" # Allows frontend to connect from anywhere in production

  # Frontend Static Site
  - type: web
    name: skribbl-frontend
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        # IMPORTANT: Replace this with your actual skribbl-backend URL from Render
        # Example: https://skribbl-backend-xxxx.onrender.com
        value: "https://your-backend-url.onrender.com"
